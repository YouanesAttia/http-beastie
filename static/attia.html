<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 20px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .avatar {
            width: 150px;
            margin-right: 10px;
        }
        .card {
            width: 400px;
            padding: 20px;
            margin: 0 auto;
            display: flex;
            border: 1px dotted blue;
            justify-content: space-around;
            text-align: center;
            background-color: #ddebf8;
            border-bottom: 10px solid #d8cefe;
            box-shadow: 5px 5px 10px 2px rgba(0, 0, 0, 0.5);
        }
        .border {
            border: 1px dotted blue;
        }
    </style>
</head>
<body>
    <div class="card">
        <div>
            <img class="avatar" src="https://placehold.co/150x150" alt="Youanes Attia">
        </div>
        <div>
            <h1>Youanes Attia</h1>
            <p>Fullstack developer</p>
            <h4>Cairo, Egypt</h4>
        </div>
    </div>
</body>
</html>
